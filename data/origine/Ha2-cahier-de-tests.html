    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0aaff",
                        "secondary": "#c77dff",
                        "accent": "#9d4edd",
                        "accent-dark": "#7b2cbf",
                        "accent-darker": "#5a189a",
                        "background": "#0a0a0f",
                        "surface": "#12121a",
                        "surface-light": "#1a1a25",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                },
            },
        }
    </script>

    <style>
        body {
            background-color: #0a0a0f;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
        }

        .neon-border {
            border: 1px solid #9d4edd;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
        }

        .neon-text {
            color: #c77dff;
            text-shadow: 0 0 8px rgba(199, 125, 255, 0.6);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-pending { background: #6b7280; }
        .status-passed { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-failed { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .status-blocked { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

        .test-card {
            transition: all 0.3s ease;
        }

        .test-card:hover {
            border-color: #9d4edd;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.2);
        }

        .test-card.expanded .test-details {
            max-height: 2000px;
            opacity: 1;
        }

        /* Card status styles */
        .test-card.card-passed {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.15);
        }
        .test-card.card-passed:hover {
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .test-card.card-failed {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.15);
        }
        .test-card.card-failed:hover {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .test-card.card-blocked {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.15);
        }
        .test-card.card-blocked:hover {
            border-color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .test-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-badge {
            font-size: 10px;
            padding: 4px 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .priority-must { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .priority-should { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
        .priority-could { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .filter-btn {
            padding: 8px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: rgba(157, 78, 221, 0.2);
            border-color: #9d4edd;
            color: #c77dff;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #5a189a; }
        ::-webkit-scrollbar-thumb:hover { background: #7b2cbf; }

        @media print {
            body { background: white; color: black; }
            .no-print { display: none; }
        }

        .loading-spinner {
            border: 3px solid rgba(157, 78, 221, 0.3);
            border-top-color: #9d4edd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

    <script>
        // Global data store
        let testData = null;

        // Load test data - tries fetch first, falls back to embedded data
        async function loadTestData() {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const testCases = document.getElementById('testCases');

            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            testCases.classList.add('hidden');

            try {
                // Try to fetch from external JSON file first
                const response = await fetch('Ha2-cahier-de-tests.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                testData = await response.json();
                console.log('Loaded test data from external JSON file');
            } catch (fetchError) {
                // Fall back to embedded data (for file:// protocol)
                console.log('Fetch failed, using embedded data:', fetchError.message);
                try {
                    const embeddedScript = document.getElementById('embeddedTestData');
                    if (embeddedScript) {
                        testData = JSON.parse(embeddedScript.textContent);
                        console.log('Loaded test data from embedded JSON');
                    } else {
                        throw new Error('No embedded data found');
                    }
                } catch (embeddedError) {
                    console.error('Error loading test data:', embeddedError);
                    loadingState.classList.add('hidden');
                    errorState.classList.remove('hidden');
                    document.getElementById('errorMessage').textContent = embeddedError.message;
                    return;
                }
            }

            renderMetadata();
            renderFilters();
            renderTestCases();
            loadFromLocalStorage();
            updateStats();

            loadingState.classList.add('hidden');
            testCases.classList.remove('hidden');
        }

        // Render metadata in header and footer from test data
        function renderMetadata() {
            if (!testData || !testData.metadata) return;

            const meta = testData.metadata;

            // Footer - exigences info from test data
            document.getElementById('footerExigences').textContent =
                `${meta.totalTests} exigences totales (${meta.exigences.must} Must, ${meta.exigences.should} Should, ${meta.exigences.could} Could)`;
        }

        // Load metadata from index.json (like Da0-storyboard.html)
        async function loadMetadata() {
            try {
                const response = await fetch('../index.json?' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    const meta = data.metadata;

                    document.getElementById('headerTitle').textContent = 'Cahier de Tests';
                    document.getElementById('headerSubtitle').textContent = `${meta.platform} v${meta.version}`;
                    document.getElementById('headerServerUrl').textContent = meta.server.url;

                    document.getElementById('footerTitle').textContent = `${meta.title} - ${meta.platform}`;
                    document.getElementById('footerPort').textContent = `Port: ${meta.server.port}`;
                    document.getElementById('footerDesign').textContent = `Design: ${meta.design}`;
                }
            } catch (e) {
                console.log('Metadata not available');
            }
        }

        // Format date from YYYY-MM-DD to DD/MM/YYYY
        function formatDate(dateStr) {
            if (!dateStr) return '--/--/----';
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parts[2]}/${parts[1]}/${parts[0]}`;
            }
            return dateStr;
        }

        // Render filter buttons
        function renderFilters() {
            if (!testData || !testData.categories) return;

            const container = document.getElementById('filterButtons');
            container.innerHTML = '<button class="filter-btn border border-white/20 active" data-filter="all">Tous</button>';

            testData.categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn border border-white/20';
                btn.dataset.filter = category.id;
                btn.textContent = category.name.replace('Gestion des ', '').replace('Integration ', '');
                container.appendChild(btn);
            });

            // Attach event listeners
            container.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.dataset.filter;
                    document.querySelectorAll('[data-category]').forEach(section => {
                        if (filter === 'all' || section.dataset.category === filter) {
                            section.style.display = 'block';
                        } else {
                            section.style.display = 'none';
                        }
                    });
                });
            });
        }

        // Render all test cases
        function renderTestCases() {
            if (!testData || !testData.categories) return;

            const container = document.getElementById('testCases');
            container.innerHTML = '';

            testData.categories.forEach(category => {
                const sectionHtml = renderCategory(category);
                container.innerHTML += sectionHtml;
            });
        }

        // Render a single category section
        function renderCategory(category) {
            let testsHtml = '';

            category.tests.forEach(test => {
                testsHtml += renderTestCard(test);
            });

            return `
                <div class="mb-12" data-category="${category.id}">
                    <h2 class="text-xs tracking-[0.3em] text-white/40 uppercase mb-6 flex items-center gap-3">
                        <span class="w-8 h-[1px] bg-accent"></span>
                        Section ${category.section} : ${category.name}
                    </h2>
                    ${testsHtml}
                </div>
            `;
        }

        // Render a single test card
        function renderTestCard(test) {
            const priorityClass = `priority-${test.priority}`;
            const priorityLabel = test.priority === 'must' ? 'Must Have' :
                                  test.priority === 'should' ? 'Should Have' : 'Could Have';

            // Build details content
            let detailsLeft = '';
            let detailsRight = '';

            // Objective
            if (test.objective) {
                detailsLeft += `
                    <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3">Objectif</h4>
                    <p class="text-sm text-white/70">${test.objective}</p>
                `;
            }

            // References
            if (test.references && test.references.length > 0) {
                detailsLeft += `
                    <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3 mt-6">References</h4>
                    <ul class="text-sm text-white/70 space-y-1">
                        ${test.references.map(ref => `<li>- ${ref}</li>`).join('')}
                    </ul>
                `;
            }

            // Preconditions
            if (test.preconditions && test.preconditions.length > 0) {
                detailsLeft += `
                    <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3 mt-6">Conditions prealables</h4>
                    <ul class="text-sm text-white/70 space-y-1">
                        ${test.preconditions.map(pre => `<li>- ${pre}</li>`).join('')}
                    </ul>
                `;
            }

            // Colors (for design tests)
            if (test.colors) {
                detailsLeft += `
                    <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3 mt-6">Couleurs a verifier</h4>
                    <ul class="text-sm text-white/70 space-y-1">
                        ${Object.entries(test.colors).map(([name, color]) =>
                            `<li class="flex items-center gap-2"><span class="w-4 h-4 inline-block" style="background:${color}"></span> ${name}: ${color}</li>`
                        ).join('')}
                    </ul>
                `;
            }

            // Steps
            if (test.steps && test.steps.length > 0) {
                const stepsHtml = test.steps.map((step, i) =>
                    `<li class="flex gap-2"><span class="text-accent">${i + 1}.</span> ${step}</li>`
                ).join('');

                if (!detailsLeft) {
                    detailsLeft += `
                        <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3">Etapes de test</h4>
                        <ol class="text-sm text-white/70 space-y-2">${stepsHtml}</ol>
                    `;
                } else {
                    detailsRight += `
                        <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3">Etapes de test</h4>
                        <ol class="text-sm text-white/70 space-y-2">${stepsHtml}</ol>
                    `;
                }
            }

            // Expected Results
            if (test.expectedResults && test.expectedResults.length > 0) {
                const resultsHtml = test.expectedResults.map(result =>
                    `<li class="flex items-center gap-2"><span class="text-green-400">&#10003;</span> ${result}</li>`
                ).join('');

                detailsRight += `
                    <h4 class="text-xs uppercase tracking-widest text-white/50 mb-3 mt-6">Resultat attendu</h4>
                    <ul class="text-sm text-white/70 space-y-1">${resultsHtml}</ul>
                `;
            }

            return `
                <div class="test-card bg-surface border border-white/10 mb-4 cursor-pointer" onclick="toggleTest(this)">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="status-dot status-pending" data-test-id="${test.id}"></div>
                                <span class="font-mono text-sm text-white/50">${test.id}</span>
                                <span class="category-badge ${priorityClass}">${priorityLabel}</span>
                            </div>
                            <span class="material-symbols-outlined text-white/30">expand_more</span>
                        </div>
                        <h3 class="text-lg font-semibold mb-2">${test.title}</h3>
                        <p class="text-white/60 text-sm">${test.description}</p>
                    </div>
                    <div class="test-details border-t border-white/10">
                        <div class="p-6 grid md:grid-cols-2 gap-6">
                            <div>${detailsLeft}</div>
                            <div>${detailsRight}</div>
                        </div>
                        <div class="p-6 border-t border-white/10 flex gap-3 no-print">
                            <button class="px-4 py-2 bg-green-500/20 border border-green-500/30 text-green-400 text-sm" onclick="event.stopPropagation(); setTestStatus('${test.id}', 'passed')">Reussi</button>
                            <button class="px-4 py-2 bg-red-500/20 border border-red-500/30 text-red-400 text-sm" onclick="event.stopPropagation(); setTestStatus('${test.id}', 'failed')">Echoue</button>
                            <button class="px-4 py-2 bg-yellow-500/20 border border-yellow-500/30 text-yellow-400 text-sm" onclick="event.stopPropagation(); setTestStatus('${test.id}', 'blocked')">Bloque</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Toggle test expansion
        function toggleTest(card) {
            card.classList.toggle('expanded');
        }

        // Set test status
        function setTestStatus(testId, status) {
            const dot = document.querySelector(`[data-test-id="${testId}"]`);
            if (dot) {
                // Update dot status
                dot.className = `status-dot status-${status}`;

                // Update card status (find parent .test-card)
                const card = dot.closest('.test-card');
                if (card) {
                    // Remove all status classes
                    card.classList.remove('card-passed', 'card-failed', 'card-blocked', 'card-pending');
                    // Add new status class
                    card.classList.add(`card-${status}`);
                }
            }
            updateStats();
            saveToLocalStorage();
        }

        // Update statistics
        function updateStats() {
            const passed = document.querySelectorAll('.status-passed').length;
            const failed = document.querySelectorAll('.status-failed').length;
            const blocked = document.querySelectorAll('.status-blocked').length;
            const total = document.querySelectorAll('.status-dot').length;
            const pending = total - passed - failed - blocked;

            document.getElementById('totalTests').textContent = total;
            document.getElementById('passedTests').textContent = passed;
            document.getElementById('failedTests').textContent = failed;
            document.getElementById('pendingTests').textContent = pending;
        }

        // Save to localStorage AND to server (JSON file)
        function saveToLocalStorage() {
            const statuses = {};
            document.querySelectorAll('.status-dot').forEach(dot => {
                const testId = dot.dataset.testId;
                const status = dot.className.replace('status-dot status-', '');
                statuses[testId] = status;
            });

            // Save to localStorage (fallback)
            localStorage.setItem('testStatuses', JSON.stringify(statuses));

            // Save to server (JSON file) if available
            saveToServer(statuses);
        }

        // Save statuses to server
        async function saveToServer(statuses) {
            try {
                const response = await fetch('/save-test-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ statuses })
                });
                const result = await response.json();
                if (result.success) {
                    console.log('Statuts sauvegardes dans le fichier JSON');
                }
            } catch (error) {
                console.log('Serveur non disponible, sauvegarde localStorage uniquement');
            }
        }

        // Load statuses from JSON data or localStorage
        function loadFromLocalStorage() {
            // First try to load from JSON data (loaded via fetch)
            if (testData && testData.testStatuses) {
                const statuses = testData.testStatuses;
                applyStatuses(statuses);
                // Sync to localStorage
                localStorage.setItem('testStatuses', JSON.stringify(statuses));
                console.log('Statuts charges depuis le fichier JSON');
                return;
            }

            // Fallback to localStorage
            const saved = localStorage.getItem('testStatuses');
            if (saved) {
                const statuses = JSON.parse(saved);
                applyStatuses(statuses);
                console.log('Statuts charges depuis localStorage');
            }
        }

        // Apply statuses to DOM
        function applyStatuses(statuses) {
            Object.keys(statuses).forEach(testId => {
                const dot = document.querySelector(`[data-test-id="${testId}"]`);
                if (dot) {
                    const status = statuses[testId];
                    // Update dot status
                    dot.className = `status-dot status-${status}`;

                    // Update card status
                    const card = dot.closest('.test-card');
                    if (card) {
                        card.classList.remove('card-passed', 'card-failed', 'card-blocked', 'card-pending');
                        card.classList.add(`card-${status}`);
                    }
                }
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadTestData();
            loadMetadata();
        });
    </script>

</body>
</html>
