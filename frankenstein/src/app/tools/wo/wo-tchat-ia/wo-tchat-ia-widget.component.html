@if (configService.tchatIaEnabled()) {
  <!-- Floating trigger button -->
  <button
    (click)="toggleVisible()"
    title="Assistant IA"
    class="fixed bottom-40 right-4 z-[100] w-12 h-12 rounded-full bg-violet-600 hover:bg-violet-500 text-white shadow-lg flex items-center justify-center transition-all duration-200 hover:scale-110 active:scale-95"
  >
    <span class="material-symbols-outlined text-xl">{{ configService.activeTool() === 'tchat' ? 'close' : 'smart_toy' }}</span>
  </button>

  <!-- Slide-panel -->
  @if (configService.activeTool() === 'tchat') {
    <div class="fixed inset-0 z-[90] flex justify-end">
      <!-- Backdrop -->
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="close()"></div>
      
      <!-- Panel (Wide max-w-5xl) -->
      <div class="relative w-full max-w-5xl bg-white dark:bg-background h-full shadow-2xl flex flex-col animate-slide-in-right">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-light-border dark:border-white/10 bg-light-surface dark:bg-background/60 sticky top-0 z-10">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-violet-600 dark:text-violet-400 text-2xl">smart_toy</span>
            <h2 class="text-xl font-bold text-light-text dark:text-white">Assistant Frankenstein Junior</h2>
          </div>
          <div class="flex items-center gap-2">
            <button (click)="openAsModal()" title="Ouvrir en popup" class="p-2 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-text-muted dark:text-white/40 transition-colors">
              <span class="material-symbols-outlined">open_in_full</span>
            </button>
            <button (click)="close()" class="p-2 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-text-muted dark:text-white/40 transition-colors">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto">
          <div class="p-6">
            <h2 class="text-xs tracking-[0.3em] text-light-text-muted dark:text-white/40 uppercase mb-6 flex items-center gap-3">
              <span class="w-8 h-[1px] bg-light-accent dark:bg-accent"></span> Assistant Intelligence Artificielle
            </h2>

            <!-- Tchat IA component -->
            <wo-tchat-ia
              [visible]="configService.activeTool() === 'tchat'"
              mode="inline"
              [executorUrl]="'http://localhost:3002'"
              [apiUrl]="'http://localhost:3001'"
              [provider]="configService.cliConfig().headerSelection.provider || 'claude-cli'"
              [model]="configService.cliConfig().headerSelection.model || 'claude-sonnet-4-6'"
              [projectId]="configService.currentProjectId()"
              title="Assistant Frankenstein Junior"
              systemPrompt="Tu es un assistant expert de la plateforme Frankenstein Junior. Tu aides les utilisateurs à créer des projets, comprendre les workflows IA, et tirer le meilleur parti de la plateforme. Sois concis, clair et bienveillant."
              [context]="{ user: currentUsername, siteName: 'Frankenstein Junior' }"
              [quickPrompts]="tchatIaQuickPrompts"
              [allowFormGeneration]="true"
              [allowZoneSelection]="true"
              [allowExport]="true"
              (closed)="close()">
            </wo-tchat-ia>
          </div>
        </div>
      </div>
    </div>
  }

  <!-- Popup version -->
  @if (showModal) {
    <div class="fixed inset-0 z-[300] flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" (click)="showModal = false"></div>
      <!-- Note: TchatIaComponent already has its own modal mode if we use it directly, 
           but here we wrap it to match the requested design -->
      <div class="relative w-full max-w-6xl max-h-[90vh] bg-white dark:bg-background rounded-2xl shadow-2xl border border-white/10 flex flex-col overflow-hidden animate-zoom-in">
        <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
          <h2 class="text-xl font-bold text-light-text dark:text-white flex items-center gap-3">
            <span class="material-symbols-outlined text-violet-600 dark:text-violet-400">smart_toy</span>
            Assistant Frankenstein Junior
          </h2>
          <button (click)="showModal = false" class="p-2 hover:bg-white/5 rounded-lg transition-colors">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
          <wo-tchat-ia
            [visible]="true"
            mode="inline"
            [executorUrl]="'http://localhost:3002'"
            [apiUrl]="'http://localhost:3001'"
            [provider]="configService.cliConfig().headerSelection.provider || 'claude-cli'"
            [model]="configService.cliConfig().headerSelection.model || 'claude-sonnet-4-6'"
            [projectId]="configService.currentProjectId()"
            title="Assistant Frankenstein Junior"
            systemPrompt="Tu es un assistant expert de la plateforme Frankenstein Junior..."
            [context]="{ user: currentUsername, siteName: 'Frankenstein Junior' }"
            [quickPrompts]="tchatIaQuickPrompts"
            [allowFormGeneration]="true"
            [allowZoneSelection]="true"
            [allowExport]="true"
            (closed)="showModal = false">
          </wo-tchat-ia>
        </div>
      </div>
    </div>
  }
}
