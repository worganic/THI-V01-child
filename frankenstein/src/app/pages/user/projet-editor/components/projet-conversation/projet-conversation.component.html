<div class="h-full flex flex-col border-l border-light-border dark:border-white/8 bg-white dark:bg-[#0f0f17]">

  <!-- Header conversation -->
  <div class="flex items-center justify-between px-4 py-2 border-b border-light-border dark:border-white/8 flex-shrink-0">
    <span class="text-xs font-bold text-light-text dark:text-white/70 uppercase tracking-wider">Conversation</span>
    <div class="flex items-center gap-1">
      <button class="p-1 rounded hover:bg-light-surface dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors">
        <span class="material-symbols-outlined text-sm">open_in_full</span>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-scroll min-h-0 px-4 py-4 space-y-4">
    <div *ngFor="let msg of messages">

      <!-- Message IA -->
      <div *ngIf="msg.role === 'ai'" class="space-y-2">
        <div class="text-xs text-light-text dark:text-white/80 leading-relaxed">
          <ol *ngIf="msg.items?.length" class="space-y-1.5 list-decimal list-inside">
            <li *ngFor="let item of msg.items" class="text-xs text-light-text dark:text-white/70 leading-relaxed">{{ item }}</li>
          </ol>
          <p *ngIf="msg.content">{{ msg.content }}</p>
        </div>
        <!-- Actions IA -->
        <div class="flex items-center gap-1 pt-1">
          <button class="p-1 rounded hover:bg-light-surface dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors">
            <span class="material-symbols-outlined text-sm">thumb_up</span>
          </button>
          <button class="p-1 rounded hover:bg-light-surface dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors">
            <span class="material-symbols-outlined text-sm">thumb_down</span>
          </button>
          <button class="p-1 rounded hover:bg-light-surface dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors">
            <span class="material-symbols-outlined text-sm">refresh</span>
          </button>
          <div class="flex-1"></div>
          <button class="p-1 rounded hover:bg-light-surface dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors">
            <span class="material-symbols-outlined text-sm">content_copy</span>
          </button>
          <button class="p-1 rounded hover:bg-light-surface dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors">
            <span class="material-symbols-outlined text-sm">edit</span>
          </button>
        </div>
      </div>

      <!-- Message utilisateur -->
      <div *ngIf="msg.role === 'user'" class="flex justify-end">
        <div class="max-w-[90%] bg-light-primary dark:bg-primary rounded-2xl rounded-tr-sm px-4 py-3">
          <p class="text-xs text-white leading-relaxed">{{ msg.content }}</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Input -->
  <div class="flex-shrink-0 border-t border-light-border dark:border-white/8 p-3">
    <div class="rounded-xl border border-light-border dark:border-white/10 bg-light-surface dark:bg-black/20 overflow-hidden">
      <textarea [(ngModel)]="inputMessage"
                (keydown.enter)="$event.preventDefault(); send()"
                placeholder="Envoyer un message..."
                rows="3"
                class="w-full px-3 py-2.5 text-xs text-light-text dark:text-white bg-transparent resize-none focus:outline-none placeholder-light-text-muted/50 dark:placeholder-white/20 leading-relaxed"></textarea>
      <div class="flex items-center justify-between px-3 py-2 border-t border-light-border dark:border-white/5">
        <div class="flex items-center gap-1.5">
          <button class="p-1 rounded text-light-text-muted dark:text-white/30 hover:text-light-primary dark:hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-sm">add</span>
          </button>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-[10px] font-semibold text-light-text-muted dark:text-white/40 uppercase tracking-wider">Sonnet 4.6</span>
          <div class="flex items-center gap-1">
            <button class="w-5 h-5 rounded-full bg-orange-400/80 flex items-center justify-center">
              <span class="material-symbols-outlined text-xs text-white">auto_awesome</span>
            </button>
          </div>
          <button (click)="send()"
                  class="p-1 rounded-lg bg-light-primary dark:bg-primary text-white hover:opacity-80 transition-opacity">
            <span class="material-symbols-outlined text-sm">arrow_upward</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
