<div class="flex h-full flex-shrink-0 border-r border-light-border dark:border-white/8 select-none overflow-hidden">

  <!-- Bande d'icônes -->
  <div class="w-10 flex flex-col items-center py-3 gap-2 border-r border-light-border dark:border-white/8 bg-light-surface dark:bg-black/20">
    <button class="p-1.5 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-primary dark:text-primary transition-colors" title="Fichiers">
      <span class="material-symbols-outlined text-base">folder_open</span>
    </button>
    <button class="p-1.5 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors" title="Paramètres">
      <span class="material-symbols-outlined text-base">settings</span>
    </button>
    <button class="p-1.5 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors" title="Composants">
      <span class="material-symbols-outlined text-base">view_module</span>
    </button>
    <button class="p-1.5 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors" title="Recherche">
      <span class="material-symbols-outlined text-base">search</span>
    </button>
    <div class="flex-1"></div>
    <button class="p-1.5 rounded-lg hover:bg-light-surface-hover dark:hover:bg-white/5 text-light-text-muted dark:text-white/30 transition-colors" title="Pièces jointes">
      <span class="material-symbols-outlined text-base">attach_file</span>
    </button>
  </div>

  <!-- Arbre du projet -->
  <div class="w-52 h-full overflow-y-scroll py-2 bg-white dark:bg-[#0f0f17]">
    <ng-container *ngTemplateOutlet="treeNodes; context: { nodes: tree }"></ng-container>
  </div>

</div>

<ng-template #treeNodes let-nodes="nodes">
  <div *ngFor="let node of nodes">
    <div class="flex items-center gap-1 px-2 py-0.5 rounded mx-1 cursor-pointer group transition-colors"
         [class]="selectedId() === node.id ? 'bg-light-primary/10 dark:bg-primary/10' : 'hover:bg-light-surface dark:hover:bg-white/5'"
         [style.padding-left.px]="8 + node.level * 10"
         (click)="setActive(node)">
      <!-- Chevron -->
      <button *ngIf="node.children?.length" (click)="toggleExpand(node); $event.stopPropagation()"
              class="w-3 h-3 flex-shrink-0 text-light-text-muted dark:text-white/30 transition-transform"
              [class.rotate-90]="node.expanded">
        <svg viewBox="0 0 12 12" fill="currentColor"><path d="M4 2l4 4-4 4"/></svg>
      </button>
      <span *ngIf="!node.children?.length" class="w-3 flex-shrink-0"></span>

      <!-- Label -->
      <span class="text-[11px] truncate leading-5"
            [class]="highlightClass(node) || (selectedId() === node.id
              ? 'text-light-primary dark:text-primary font-semibold'
              : 'text-light-text dark:text-white/70')">
        {{ node.label }}
      </span>
    </div>

    <!-- Enfants -->
    <ng-container *ngIf="node.expanded && node.children">
      <ng-container *ngTemplateOutlet="treeNodes; context: { nodes: node.children }"></ng-container>
    </ng-container>
  </div>
</ng-template>
